name: Version Consistency

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

jobs:
  version-consistency:
    permissions:
      contents: read
    uses: ./.github/workflows/reusable-version-consistency.yml
    with:
      source-repository: ${{ github.repository }}
      repository-ref: ${{ github.sha }}
