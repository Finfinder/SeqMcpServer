name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: dropdown
    id: feature-category
    attributes:
      label: Feature category
      options:
        - New MCP Tool
        - Enhancement to existing tool
        - Configuration / setup
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem-or-use-case
    attributes:
      label: Problem or use case
      description: A clear and concise description of the problem or use case this feature would address.
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see implemented.
    validations:
      required: true

  - type: textarea
    id: alternatives-considered
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or features you've considered.
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context, links to Seq API documentation, MCP specification references, or examples here.
    validations:
      required: false
